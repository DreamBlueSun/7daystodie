[丧尸技能ver0.3a]
[简介]
    添加了 丧尸技能、随机词条、稀有丧尸 共三种影响丧尸属性、攻击附着效果的buff。
    -技能  为专属于此tag的某一类丧尸必定拥有。如有需要，可以自行添加在entityclass中按格式添加tag（ps：请一定注意不要直接用set覆盖添加！会导致其他tag消失）
    -随机词条组  丧尸生成时有概率分配到其中一组词条，每组共3级buff。前2级为属性加成，3级为拥有特殊效果的精英丧尸。等级越高获取概率越低，高级buff必定携带其对应的低级buff。具体划分可见末尾的“词条抽取”。
    -元素词条  丧尸生成时有5%概率抽取其一，攻击会附着特殊的元素效果，当前共4种。
    -稀有丧尸  0.2%概率抽取其一，拥有奇奇怪怪的整活或强力效果，为特殊丧尸

    实体检测需要拥有 <property name="Buffs" value="zombieBuffStatusCheck01"/>，部分特殊技能可以通过为实体添加tag的方式附着。
    -新增tag标签
        zbsfat-再生  zbslabs-感染扩散  zbsburn-燃烧  zbsscream-尖啸  zbsmutated-变异  zbsboss-压迫
    
[部分问题]
    Q：能否与其他添加了新丧尸的mod同用？ A：经测试是可以，没有冲突。但只会有词条和已有tag的加成，本模组新增的tag需要手动添加。
    Q：丧尸的能力会不会有冲突？   A：目前体验是没有，但能力会叠加。如果模组内已有高血量、高攻击的普通怪或有丧尸进化，请酌情添加本模组。
    Q：丧尸的部分buff不生效怎么办？ A：请确认是否有模组重写过实体，如果只是修改了原版实体，将本模组放置文件夹最后加载即可（即文件夹名字排在最后）。
    Q：会不会增加卡顿？  A：肯定是会的，但增加运算量有限。目前实测血月该多少只卡还是多少只卡。
    Q：丧尸加血量后直接触发狂暴？  A：测试时没找到比较合适的解决方式，因为也不影响其他方面，就暂时当作特性吧）
    
[【新增物品】]
-突变碎片、突变/速度/强健基因片段
    特定丧尸掉落的材料，可用于合成具有特殊效用的物品。
    掉落自 突变丧尸，或附有词条 疾跑者/沉重/战场干扰/坦克 的丧尸。
-零件包
    打开后获得3个维修工具和5种随机数量的零件。
-神奇糖果
    给予9500经验值与2点技能点数。
    掉落自稀有丧尸 贪婪/暴食/恶灵骑士。
-荣誉之证
    左键使用立即产生一次等效于急救绷带的效果，拥有5秒CD；右键使用立即移除身上的负面状态（仅原版和本模组部分），并获得一次铁皮，拥有300秒CD。
    掉落自稀有丧尸 恶灵骑士。

-血肉自愈霜
    同芦荟霜，敷用后短暂致幻并降低移动力，恢复25点生命值（基础）并在16秒内每3秒额外恢复4点生命。
-抑制性功能恢复剂
    注射后，一段时间内减少骨折扭伤带来的影响，并加速其自然恢复。用于已处理的骨折扭伤时，会在注射时加速恢复一定阶段。
    合成需要 速度基因片段。
-冲刺注射剂
    注射后，大幅提升移动能力和摔落的安全高度，恢复扭伤骨折的肢体，并在生命高于25%时不断流逝生命，结束时恢复自身50点生命。
    合成需要 突变碎片 和 速度基因片段。
-铁皮药剂
    注射后，提升8点双抗与25点物块伤害，加速生命恢复，低于60%生命时再获得12点双抗；可以抵御部分非伤害的负面效果。
    合成需要 突变碎片 和 强健基因片段。

-腐蚀之刃/腐蚀之刃(激活)
    升级版的骨刀，对应时期分别为 猎刀和骨刀之间、猎刀的升级版，深度刀伤可以提升制作等级。
    手持腐蚀之刃（激活）时，获得突变。当生命高于50%时，每3秒损失3点生命，移速和生命体力恢复获得加强，攻击敌人有30%概率叠加攻速和攻击，至多提升36%；当生命低于75%时，额外获得15点伤害加成。攻击附着轻度流血，有30%概率触发5点吸血，75%概率为目标附着腐蚀。击杀敌人时恢复8点生命和饱食度。
    合成需要 突变碎片 和 突变基因片段。

-瓶装腐蚀液 触炸腐蚀手雷
    新增的两种投掷物，腐蚀液和腐蚀手雷 爆炸后会附着范围腐蚀，腐蚀液与鸡尾酒一致，出伤更快但持续时间较短；腐蚀手雷比触炸多一个减抗流血的buff，其他属性更低。
    合成需要 突变碎片。

-强化重头模组    合成需要 强健基因片段
    重头模组增强版，25%概率眩晕并减速目标，额外12%概率击倒目标，攻击眩晕中的目标获得额外伤害加成。
-强制能力模组    合成需要 突变碎片 和 速度基因片段
    改进配件模组改版，降低胸甲的移动速度惩罚和体力惩罚，提升移速和体力恢复，但生命恢复减少30%。
-突变装甲板模组/突变带状装甲板模组    合成需要 突变碎片 和 强健基因片段
    装甲板/带状装甲板的增强版，普通额外获得8%负面效果抗性；带状额外获得10%负面效果抗性与15%眩晕抗性。

[【技能】]
[狂暴]  被动 粒子-触发时子弹火花  / HalfHealth AttedBleeding
    带有 feral/radiated 标签的丧尸会在 60%血线后触发狂暴，提升移速/攻击并降低抗性，攻击15%概率附着3秒轻度出血，在生命高于75%时狂暴会暂时停止。
    受到轻度出血时，会持续损失生命并更易受伤，对流血、擦伤的抗性下降，且双抗降低3点。
[野性觉醒]  主动  / WildnessArousal AttedBite
    带有 animal/hostile 标签的动物会在攻击时附着撕咬，每次叠加都会使攻速和攻击提升。
    受到撕咬时，减少移速和跳跃能力，每次叠加都会减少15%移速跳跃和物抗，至多90%。击杀掉附着野性觉醒的动物可以解除撕咬。

[再生]  被动  / Regeneration AttedCystis
    所有带有 zbsfat 标签的胖体型丧尸（原版已添加的有莫伊、旅客、大妈、军肥）会随普通/凶残/辐射阶段的提升获得逐段增加的生命上限、生命恢复。固定获得8点双抗，但同时移速降低20%。攻击敌人会附着囊肿。
    受到囊肿时，会随受击的次数不断降低移速、攻速和体力恢复，并流失饱食度。在受击3次后会产生爆炸并治愈周边丧尸80点生命；如果在恢复期间再次触发，治愈降为25点。
[感染扩散]  主动  / InfectionSpread AttedInfectionSpread
    所有带有 zbslabs 标签的医护和实验室丧尸（原版已添加的有护士、实验室人员、防化服）的攻击会有16%/5%额外概率附着疲劳/擦伤，并且攻击增长感染的速度更快。
    攻击会有36%概率造成感染扩散。受到感染扩散时，对负面效果的抗性降低15%，并根据现在的状态给予负面效果。当被感染时，感染程度越深损失越多生命值，生命体力恢复和物理抗性降低；当处于疲劳状态时，体力恢复大幅降低；当处于擦伤/深度裂伤时，生命恢复减弱并持续损失生命。
[挖掘机]  主动  / Digger
    所有带有 zbsminer 标签的工人丧尸，实体伤害降低25%，攻速和物块伤害大幅提升，元素抗性增加15点。（由于挖掘爆炸易出红字，目前已移除）
[连锁爆炸]  被动 粒子-爆炸前闪光  / ExplosiveCascade
    带有 zombieCop 标签的警察丧尸，临近自爆后一段时间未死亡，爆炸会使周边的丧尸、丧尸生物一并发生爆炸。连锁爆炸无物块伤害，范围与军肥爆炸相同。
[燃烧]  专属  / Burned AttedEmber
    带有 zbsburn 标签的被灼烧丧尸，自身受燃烧的影响减少，攻击会附着余烬，有32%概率附着燃烧，余烬会使燃烧更加剧烈。每5秒自身会燃烧一次，使周边敌人附着余烬。
    受到余烬时，高温抗性降低，水分消耗略微加快。在余烬持续时间内着火，会加剧燃烧，更快损失生命。可用与灭火同样的方式熄灭。
[深渊]  主动  / Abyss AttedAbyss
    带有 crawler 标签的爬行丧尸，攻击时有56%概率汲取生命，并触发深渊之握（凶残）；为普通时有14%概率触发深渊之握。
    受到深渊之握时，视野行动受困，随时间流逝生命并减少生命上限。当前生命低于25%时，生命加速流逝。击杀附近的爬行者可解除深渊之握。
[尖啸]  专属  / Scream AttedScream
    带有 zbsscream 标签的尖啸丧尸，自身生命会不断流逝，伤害提升25点，攻击附着5秒尖啸。
    受到尖啸时，视野会重影，降低攻击移速并流逝生命。
[变异]  专属  / Mutated AttedCorrosion
    带有 zbsmutated 标签的变异丧尸，生命恢复加速，攻击附着腐蚀。
    受到腐蚀时，视野会被辐射干扰，对负面效果的抗性降低25%，双抗降低8点，生命恢复减半，生命缓慢流逝，并根据状态获得效果：当受到致命辐射时，加速流逝生命；当为感染状态时，每2秒额外损耗体力生命；当受到囊肿时，会更快饥饿。对丧尸作用时，减抗和生命流逝效果翻倍。
    -掉落少量突变碎片，凶残以上额外掉落突变碎片和突变基因片段。

[战术行动]  被动  / TacticalAction Morale
    带有 soldier 标签的士兵丧尸，自身属性获得小幅加强，攻击时更易附着负面状态。每5秒为周边丧尸施加士气高涨（不会为自身附加），使生命和抗性提升，当附近有附着的个体死亡时会使任意一个丧尸的士气丧失；累积至30秒时额外提升伤害。
[压迫]  专属  / Oppress BasedOppress AttedOppress
    带有 zbsboss 标签的丧尸（原版已添加的有自爆），伤害提升25点，双抗提升8点，靠近和攻击会附着压迫，攻击18%概率触发窒息。
    受到压迫时，会使自身攻击攻速提高20%，双抗降低10%；当附着对象为丧尸时，攻击攻速提升，但不断流逝生命。受到窒息时，行动和恢复受限，伤害、物抗降低，并缓慢流逝生命。

[【随机词组】] 仅凶残以上丧尸能获得，animal/boss/crawler/zbsfat/zbsboss无法获得。
    仅凶残以上丧尸能获得，词条选取率为35%，每组词条仅能获取一组，词条内按概率由低到高排序，当拥有其前一个词条时，后词条一并获得。
    
-轻词条组-  
    [疾跑者] 粒子-余烬飘散  / GroupRunner AttedImpact
        丧尸12%概率获得。丧尸在最高速时会浮现余烬粒子，移速和攻击将大幅提升，攻击附着冲击。击中或持续15秒后力竭，此后20秒又逐步恢复至最高速。
        受到冲击时，会短暂减速。
        -击杀后获得少量突变碎片和速度基因片段。
    [嗜血]  / Bloodthirsty
        丧尸24%概率获得。提升75点生命和15点基础攻速，在75%/50%生命后获得30%/60%攻速提升。每次攻击会造成15点吸血，低于50%生命时额外提升35点。攻击45%概率附着轻度出血。
    [轻甲]  / ArmorLight
        丧尸32%概率获得。提升20点物抗，低于75%生命时降低8点物抗；低于50%时再降低12点。

-重词条组-
    [沉重] 粒子-光点足迹  / Heavy AttedGiddy
        凶残以上丧尸12%概率获得。生命上限提高180%，普通状态下移速攻速减慢，攻击有12%的概率附着眩晕，20秒后开始冲撞；冲撞时，逐渐叠加速度、攻击会击倒玩家，击中目标或8秒后停止，期间攻击有100%/60%/5%的概率附着冲击、眩晕、脑震荡，攻击方块会发生爆炸。
        受到眩晕时，会短暂减速并降低8点物抗。
        -击杀后获得少量突变碎片和强健基因片段。
    [偏执]  / Bigotry
        丧尸18%概率获得。当锁定的目标为玩家时，攻击攻速提升30%，物抗降低15点；当为非玩家的目标时，行动减缓。
    [铁皮]  / IronSkin
        非 soldier 标签的丧尸28%概率获得。提升15点双抗与物块伤害；低于60%生命时获得15点物抗，低于40%生命时再获得25点双抗。
   
-高速词条组-
    [战场干扰]  / BGInterference
        凶残以上丧尸8%概率获得。提升80%移速攻速，生命恢复加速，攻击附着冲击，但伤害降低15%，生命上限降低15%，受到的伤害增加。
        -击杀后获得少量突变碎片和速度基因片段。
    [高速]  / Rapidly
        丧尸12%概率获得。提升30%移速攻速，但伤害降低10%，物抗降低15%。
    [敏捷]  / Agile
        丧尸32%概率获得。提升基础移速，物抗降低5点。
   
-坦克词条组-
    [坦克] 粒子-胸口光团  / Tank Protection
        凶残以上丧尸8%概率获得。额外获得300点和500%生命，生命恢复加速，但伤害降低25%。攻击12%概率附着眩晕，每8秒为自己和周边丧尸施加一次保护，保护会减少一次受到的伤害，受击或12秒后移除。受保护的对象会拥有光团粒子。
        -击杀后获得少量突变碎片和强健基因片段。
    [重甲]  / ArmorHeavy
        丧尸16%概率获得。基础生命增加200点，物抗增加30点，元素抗性增加15点，但伤害降低15%，移速降低30%。
    [厚重]  / Thick
        丧尸28%概率获得。拥有125%生命，元素抗性增加15点。

[【元素词条】] 仅凶残以上丧尸能获得，animal/boss/zbsboss无法获得，4%概率抽取其一
[寒冷] 粒子-呼出白气  / ElementCold AttedElementCold AttedElementFreeze
    提升12点元素抗性，攻击附着寒冷，寒冷状态下受击3次会被冻结。攻击被冰冻的目标时，获得额外伤害加成。
    受到寒冷时，移速攻速减慢，体力恢复减缓，再次受击3次会被冻结，效果加剧且自身双抗降低15点。在篝火、火把旁边或燃烧时会解除寒冷和冻结状态。
[潮湿] 粒子-脚部水波  / ElementWet AttedElementWet
    生命上限提高25%，自身会缓慢再生，攻击会附着潮湿，自身的火焰会被熄灭。当受到电击时，会范围导电。
    受到潮湿时，移速攻速略微减慢，生命恢复加速。会移除干燥和着火。在篝火、火把旁边或燃烧时会解除潮湿状态。
[干燥] 粒子-篝火火焰 / ElementDry AttedElementDry AttedElementDryCracking
    在非潮湿的环境下，攻击会附着干燥，燃烧时攻击必定会附着燃烧；在潮湿的环境下，攻速移速减缓，但攻击大幅提升，攻击附着皮肤开裂。
    受到干燥时，水分消耗加快，生命体力恢复减缓。在雨天、浸泡水中或喝水会解除干燥。受到皮肤开裂时，更容易受到流血和损伤，生命恢复减速。
[辐射]  / ElementRadiation
    仅辐射丧尸可获得。生命上限降低30%，移速加快，自身会超速再生。攻击会大幅加速感染，并附着致命辐射。

[【稀有丧尸】] 仅凶残以上丧尸能获得，animal/boss/crawler/zbsfat/zbsboss无法获得，0.2%概率抽取其一。Boss类仅凶残以上丧尸能获得。
-Boos类-  仅凶残以上丧尸能获得，不可与词条类属性共存，出现时会有buff提醒，掉落额外战利品。
[贪婪]  <=1 粒子-范围雪花  / RareGreedy
    拥有8倍生命和高恢复，但行动迟缓。玩家攻击它时会根据当前生命给予金钱，同时根据受击次数提升自身伤害。高于50%生命时给予中量的公爵币和纸币；低于50%生命时给予少量的公爵币和碎布；在低于25%生命时恢复正常行动。
    -掉落神奇糖果和较大量公爵币。
[恶毒]  2 粒子-黑烟  / RareVicious  AttedNausea
    拥有5倍生命和一定恢复，行动略微迟缓。攻击各有50%概率附着反胃、腐蚀。每5秒释放黑烟，使自身恢复80点生命，并使周边所有实体附着囊肿。死亡后，爆炸并附着大范围反胃。
