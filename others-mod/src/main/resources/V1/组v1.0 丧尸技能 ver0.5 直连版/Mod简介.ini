    [侵吞] 由暴食附着 / RareDevour
    需要周边存在暴食。附着后获得2倍生命。暴食在周边时，每5秒为其恢复50点生命。基础攻速和伤害提升35点，攻击为暴食叠加1层吞噬。低于15%生命时，会被附近的暴食引爆。
    -击杀后获得额外公爵币。

[恶灵骑士]  5 粒子-头部火光 足部火焰（狂暴）  / RareGhostRider
    拥有5倍生命和高恢复，行动非常迅捷。受到燃烧时会加速再生。自身低于50%血量时会触发狂暴，束缚附近所有实体。自身不会受到束缚影响。
    攻击造成特殊效果，将从以下效果中随机选取：普攻造成150%伤害并附着燃烧；束缚玩家；使附近10m范围内丧尸获得被灼烧者的[燃烧]，并为自己恢复180点生命；使玩家受到平衡之焰、审判之焰（狂暴后）。
    当未进入狂暴时，伤害降低50%，攻击概率附着平衡之焰；当进入狂暴时，伤害恢复，再生减缓，攻击会重置目标身上的束缚附着，攻击概率附着平衡之焰与审判之焰。
    受到束缚时，移动禁锢，并每秒流逝当前5%的生命。
    受到平衡之焰时，自身等级越高，属性降低越严重，持续10秒。
    受到审判之焰时，若生命高于80%，使当前生命降低30%，并为周边所有丧尸恢复80点生命；若生命低于80%且高于30%，受到审判之焰效果，降低25%双抗，燃烧并每秒流逝当前生命的10%；若生命低于30%，附着普通的燃烧。持续8秒。
