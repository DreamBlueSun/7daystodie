        当感染高于等于60%时，体力生命恢复减少70%，生命上限提高100%，移速缓慢，近战攻速加快、伤害减少70%，不断流逝饥渴度。每2秒恢复3点生命，感染增长0.5%。受击会使目标附着尸蛆，受击时恢复自身10点生命。攻击敌人为其附着尸蛆啃噬，每秒扣除其25点生命，不断为自身恢复生命、体力和饥渴值。击杀后将感染值重置回60%。
            若身周存在敌人，会不断受到尸蛆驱使，并暂时加强自身属性；若未击杀，每秒流逝5点生命直至宿主驱使移除。每击杀一个实体恢复自身25点生命。
        感染达到140%时，每2秒减少当前生命的10%，不断流血，直至死亡。

[词条抽取]
    以下为概率部分的介绍，若想自行修改出现概率可以阅读参考。
    由于同buff在同时间同效果的Random取值上一致，因此分组使用CVar值。
    -随机词条组  在开始用 .randZBSgroup 划分 轻/重 高速/坦克 两边，选中一组后在0-100间取值，低于32为前词条组，高于72为后词条组。由于Random的特性，当概率取值在8以下时，低于24/16的条件会因沿用取值而一并满足。
    -元素词条  用 .randZBSelement 在0-20间取值，等于对应词条的数字即赋予。
    -普通词条 已移除
    -稀有丧尸  用 .randZBSrare 在0-500间取值，等于对应词条的数字即赋予。0~5区间时成为Boss，其他词条无法获取；高于10时概率成为变种丧尸；高于300时概率成为感染丧尸。
