[赌徒]  3 粒子-彩色粒子  / RareGambler
    额外获得1250点生命上限，攻速减缓，攻击会随机触发效果，未触发效果时，消耗自身当前5%生命。厄运：1.爆炸并产生无视敌我的范围反胃；2.将攻击的目标在3格范围内随机传送，并恢复目标80点生命；3.使目标获得一次等效于急救绷带的效果；4.自身附着燃烧，并掉落随机数量的废料（骨头、羽毛、废聚合物、废铁、废黄铜）。
    好运：1.使对方附着轻度流血、囊肿、感染扩散、寒冷；2.击晕目标并恢复自身80点生命；3.恢复自身全部生命，并获得再生；4.获得所有主动技能。
