    拥有5倍生命，行动略微迟缓，攻击大幅下降，但攻击必定附着并大幅加深感染。攻击受感染的人时，自身恢复全部生命。
[尸蛆] 350 流血  / RareCorpseMaggot
    行动时快时慢，攻击目标损失自身生命并使目标加速感染尸蛆。每8秒加速身周的尸蛆感染并蔓延周边丧尸，死亡时爆炸并扩散尸蛆。
    被尸蛆入侵身体时，会先累积感染计数，每秒增长一次感染，达到100%时身体被尸蛆侵占。
    受到尸蛆入侵时，体力生命恢复减少15%，缓慢流逝饥渴度。高于10%入侵度时，每秒流逝0.5点生命，入侵增长0.2%；当入侵高于50%时，攻击其他实体时也会使其被尸蛆感染；当入侵达到100%时，完全感染，附着尸蛆感染。近身攻击实体会使自身损失8点生命并减少0.8%入侵；受到燃烧时每秒减少1%入侵；消炎药每秒会消除3%入侵。
    受到尸蛆感染时，攻击会扩散尸蛆，受到燃烧且感染超过5%时每秒减少0.1%感染；60%感染以下时，消炎药每秒会消除0.6%感染，可以完全清除尸蛆感染。
        当感染低于30%时，体力生命恢复减少30%，缓慢流逝饥渴度。每2秒流逝0.4点生命，感染增长0.1%；
