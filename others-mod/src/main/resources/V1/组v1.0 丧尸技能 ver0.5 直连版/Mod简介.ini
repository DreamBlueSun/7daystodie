[暴食]  4 粒子-范围雪花  / RareGluttony  AttedDevour
    拥有10倍生命和高恢复，但行动迟缓。出现时为周边丧尸附着侵吞，每5秒为其恢复50点的生命，同时恢复自身等于吞噬层数的生命。当附近的侵吞生命低于15%，暴食会将其引爆，造成仅实体伤害的爆炸。死亡后，移除附近玩家身上附着的吞噬。
    攻击会附着反胃，并使对象叠加3层吞噬。60秒内叠加至20层时，为周边所有实体附着吞噬，附着的实体越多，血量消耗越快。
    受到吞噬时，视野行动会被封锁，每存在一个附着的实体都会使自身每秒丧失5点生命。当暴食死亡时会移除。
